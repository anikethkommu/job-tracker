<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker — Smart Application Manager</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Syne (headings) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ───── HEADER ───── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span>JobTrackr</span>
      </div>
      <p class="tagline">Track every application. Land your dream job.</p>
    </div>
  </header>

  <!-- ───── STATS DASHBOARD ───── -->
  <section class="stats-section">
    <div id="stats" class="stats-grid">
      <!-- filled by JS -->
    </div>
  </section>

  <!-- ───── ADD JOB FORM ───── -->
  <section class="form-section">
    <h2 class="section-title">Add New Application</h2>
    <div class="form-card">
      <div class="form-row">
        <div class="input-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" placeholder="e.g. Google" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="role">Job Role</label>
          <input type="text" id="role" placeholder="e.g. Frontend Developer" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="date">Date Applied</label>
          <input type="date" id="date" />
        </div>
        <div class="input-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="Applied">🔵 Applied</option>
            <option value="Interview">🟠 Interview</option>
            <option value="Offer">🟢 Offer</option>
            <option value="Rejected">🔴 Rejected</option>
          </select>
        </div>
      </div>
      <div class="input-group full-width">
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" placeholder="e.g. Referral from John, 2 rounds expected..."></textarea>
      </div>
      <button id="addBtn" onclick="addJob()">+ Add Application</button>
    </div>
  </section>

  <!-- ───── JOB LIST ───── -->
  <section class="list-section">
    <div class="list-header">
      <h2 class="section-title">Your Applications</h2>
      <div class="controls">
        <input type="text" id="search" placeholder="🔍 Search company or role..." oninput="renderJobs()" />
        <select id="filterStatus" onchange="renderJobs()">
          <option value="All">All Statuses</option>
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>
        <select id="sortBy" onchange="renderJobs()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="company">Company A–Z</option>
        </select>
      </div>
    </div>

    <div id="jobList" class="job-grid">
      <!-- filled by JS -->
    </div>

    <p id="emptyMsg" class="empty-msg" style="display:none;">
      No applications found. Add one above! 🚀
    </p>
  </section>

  <!-- ───── EDIT MODAL ───── -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3>Edit Application</h3>
      <div class="input-group">
        <label>Company Name</label>
        <input type="text" id="editCompany" />
      </div>
      <div class="input-group">
        <label>Job Role</label>
        <input type="text" id="editRole" />
      </div>
      <div class="input-group">
        <label>Date Applied</label>
        <input type="date" id="editDate" />
      </div>
      <div class="input-group">
        <label>Status</label>
        <select id="editStatus">
          <option value="Applied">🔵 Applied</option>
          <option value="Interview">🟠 Interview</option>
          <option value="Offer">🟢 Offer</option>
          <option value="Rejected">🔴 Rejected</option>
        </select>
      </div>
      <div class="input-group">
        <label>Notes</label>
        <textarea id="editNotes"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveEdit()">Save Changes</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ───── TOAST ───── -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
